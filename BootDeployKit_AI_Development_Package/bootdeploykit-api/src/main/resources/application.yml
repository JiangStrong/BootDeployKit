server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  tomcat:
    max-swallow-size: 2MB

spring:
  application:
    name: bootdeploykit-api
  servlet:
    multipart:
      enabled: false
  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    cache: false
    settings:
      number_format: computer

bootdeploykit:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://192.168.1.50:3000
      - http://127.0.0.1:3000
      - https://bootdeploykit.com
